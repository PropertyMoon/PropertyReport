[phases.setup]
# WeasyPrint runtime deps. The import succeeds but PDF render fails at
# ctypes load time without ALL of these — libglib2.0-0 (provides
# libgobject-2.0) in particular is usually pulled transitively by pango
# but nixpacks doesn't resolve it.
aptPkgs = [
    "libcairo2",
    "libglib2.0-0",
    "libpango-1.0-0",
    "libpangoft2-1.0-0",
    "libharfbuzz0b",
    "libgdk-pixbuf-2.0-0",
    "libffi-dev",
    "shared-mime-info",
    "fontconfig",
    "fonts-dejavu-core",
    "fonts-liberation",
]

[start]
cmd = "uvicorn api:app --host 0.0.0.0 --port $PORT --workers 2"
