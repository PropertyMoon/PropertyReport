# No [build] block on purpose — let Railway auto-detect the build method
# from the repo. With a Dockerfile at the root and nixpacks.toml removed,
# Railway falls back to "Dockerfile" automatically and respects the apt
# install inside it (which was the goal — WeasyPrint needs libglib /
# libpango / libcairo / libharfbuzz / libgdk-pixbuf at runtime).

[deploy]
startCommand = "uvicorn api:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
