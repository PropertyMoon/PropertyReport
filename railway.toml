[build]
# Phase 2B: Switched from NIXPACKS to DOCKERFILE because nixpacks's
# aptPkgs was not making WeasyPrint's transitive system libs (libglib /
# libgobject / libharfbuzz) visible to the runtime loader. The Dockerfile
# in the repo root pulls them in via apt and the renders succeed.
# NOTE: Railway is case-sensitive on this value — must be UPPERCASE.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn api:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
