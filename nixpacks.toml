[phases.setup]
# WeasyPrint runtime deps. Without these the import works but PDF render fails.
aptPkgs = [
    "libcairo2",
    "libpango-1.0-0",
    "libpangoft2-1.0-0",
    "libgdk-pixbuf-2.0-0",
    "libffi-dev",
    "shared-mime-info",
    "fonts-dejavu-core",
    "fonts-liberation",
]

[start]
cmd = "uvicorn api:app --host 0.0.0.0 --port $PORT --workers 2"
