# No [build] block on purpose — let Railway auto-detect the build method
# from the repo. With a Dockerfile at the root and nixpacks.toml removed,
# Railway falls back to "Dockerfile" automatically and respects the apt
# install inside it (which was the goal — WeasyPrint needs libglib /
# libpango / libcairo / libharfbuzz / libgdk-pixbuf at runtime).

[deploy]
# No startCommand on purpose. Railway runs deploy.startCommand overrides in
# exec form for Dockerfile-built images, which means $PORT is passed as the
# literal string "$PORT" and uvicorn fails to bind. The Dockerfile's shell-
# form CMD already expands $PORT correctly, so let it own the start command.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
